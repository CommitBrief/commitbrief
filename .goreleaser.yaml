# .goreleaser.yaml — release pipeline for CommitBrief.
#
# Design rationale: ADR-0013 §6.
# The visibility flip happened at the end of Phase 8 (just before v0.4.0);
# v0.0–v0.3 tags were cut while private and never published. From v0.4.0
# onward the release workflow drops `--skip=publish` and goreleaser
# uploads binaries to GitHub Releases plus formulas to the Homebrew tap
# and Scoop bucket repos. Cross-repo pushes require HOMEBREW_TAP_GITHUB_TOKEN
# (a PAT with `repo` scope; the default GITHUB_TOKEN can't write to
# CommitBrief/homebrew-tap or CommitBrief/scoop-bucket).

version: 2

project_name: commitbrief

before:
  hooks:
    - go mod tidy

builds:
  - id: commitbrief
    main: ./cmd/commitbrief
    binary: commitbrief
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/CommitBrief/commitbrief/internal/version.Version={{.Version}}
      - -X github.com/CommitBrief/commitbrief/internal/version.Commit={{.Commit}}
      - -X github.com/CommitBrief/commitbrief/internal/version.Date={{.Date}}

archives:
  - id: commitbrief
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

# Cross-repo pushes (homebrew-tap, scoop-bucket) need a PAT with `repo`
# scope; the workflow injects it via HOMEBREW_TAP_GITHUB_TOKEN.
# `skip_upload: auto` means goreleaser uploads on stable tags but skips
# on prereleases (e.g. v0.4.0-rc.1) — safe default.

brews:
  - name: commitbrief
    repository:
      owner: CommitBrief
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/CommitBrief/commitbrief
    description: LLM-powered local code review CLI
    license: GPL-3.0-or-later
    skip_upload: auto
    install: |
      bin.install "commitbrief"
    test: |
      system "#{bin}/commitbrief", "--help"

scoops:
  - repository:
      owner: CommitBrief
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/CommitBrief/commitbrief
    description: LLM-powered local code review CLI
    license: GPL-3.0-or-later
    skip_upload: auto

release:
  draft: false
  prerelease: auto
