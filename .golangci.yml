version: "2"

# golangci-lint v2 schema. The v1 → v2 migration split "linters" from
# "formatters" (gofmt/goimports moved), merged gosimple into staticcheck,
# and renamed several config fields (linters-settings → linters.settings,
# issues.exclude-rules → linters.exclusions.rules).

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: testdata/
        linters:
          - errcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/CommitBrief/commitbrief
