# golangci-lint configuration for CommitBrief.
# Targets golangci-lint v1.55+; migrate to v2 schema once the CI runner
# pins a v2 release.

run:
  timeout: 5m
  go: "1.25"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - staticcheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/CommitBrief/commitbrief
  gofmt:
    simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: testdata/
      linters:
        - errcheck
        - unused
